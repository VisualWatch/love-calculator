        function playMoodSong(percent) {
            if (!audioEnabled) {
                document.getElementById("songStatus").innerHTML = `<i class="fas fa-hand-pointer"></i> Click the music bar first! 🎵`;
                return;
            }
            
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            
            let songUrl = "";
            let moodName = "";
            
            if (percent < 10) {
                songUrl = workingSongs.sad;
                moodName = "💔 Sad Melody - Heartfelt Tears";
            } else if (percent < 20) {
                songUrl = workingSongs.melancholic;
                moodName = "🌧️ Melancholic Rain - Deep Emotions";
            } else if (percent < 30) {
                songUrl = workingSongs.gentle;
                moodName = "🍂 Gentle Sorrow - Autumn Whispers";
            } else if (percent < 40) {
                songUrl = workingSongs.hopeful;
                moodName = "🌙 Hopeful Dawn - Rising Light";
            } else if (percent < 50) {
                songUrl = workingSongs.romantic;
                moodName = "🌸 Romantic Blossom - Sweet Love";
            } else if (percent < 60) {
                songUrl = workingSongs.warm;
                moodName = "✨ Warm Embrace - Gentle Connection";
            } else if (percent < 70) {
                songUrl = workingSongs.joyful;
                moodName = "💫 Joyful Heart - Dancing Stars";
            } else if (percent < 90) {
                songUrl = workingSongs.happy;
                moodName = "🌈 Happy Love - Radiant Sunshine";
            } else {
                songUrl = workingSongs.euphoric;
                moodName = "🎉✨ Celestial Euphoria - Divine Happiness ✨🎉";
            }
            
            const audio = new Audio(songUrl);
            currentAudio = audio;
                        audio.volume = 0.7;
            audio.play().then(() => {
                console.log("Song playing:", moodName);
                document.getElementById("songStatus").innerHTML = `<i class="fas fa-play-circle"></i> ♪ Now Playing: ${moodName} (${percent}%) ♪ <i class="fas fa-heartbeat"></i>`;
            }).catch(err => {
                console.log("Playback error:", err);
                document.getElementById("songStatus").innerHTML = `<i class="fas fa-exclamation-triangle"></i> Tap the music bar to enable audio!`;
                audioEnabled = false;

        window.calculateLove = async function () {
            const name1 = document.getElementById("name1").value.trim();
            const name2 = document.getElementById("name2").value.trim();

            if (!name1 || !name2) {
                alert("🌌 Please enter both names to unlock the cosmic bond!");
                return;
            }

            let combined = [name1.toLowerCase(), name2.toLowerCase()].sort().join("");
            let hash = 0;
            for (let i = 0; i < combined.length; i++) {
                hash += combined.charCodeAt(i) * (i + 1) * 7;
            }
            let percent = (hash % 96) + 5;
            
            const resultDiv = document.getElementById("result");
            resultDiv.style.display = "block";
            
            resultDiv.innerHTML = `
                <div class="energy-meter">
                    <div style="font-size: 0.8rem; letter-spacing: 2px;">❤️ LOVE FREQUENCY ❤️</div>
                    <div class="percent-value" id="lovePercentAnimate">0%</div>
                    <div style="margin: 15px 0;">
                        <div style="height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden;">
                            <div id="meterFill" style="width: 0%; height: 100%; background: linear-gradient(90deg, #ff3366, #ff85a2); border-radius: 10px; transition: width 1.5s ease;"></div>
                        </div>
                    </div>
                    <div class="love-quote" id="loveQuote"></div>
                </div>
            `;

            let current = 0;
            const percentElement = document.getElementById("lovePercentAnimate");
            const meterFill = document.getElementById("meterFill");
            const timer = setInterval(() => {
                if (current >= percent) {
                    clearInterval(timer);
                    showQuote(percent, name1, name2);
                    burstConfetti();
                    playMoodSong(percent);
                    for (let i = 0; i < 40; i++) {
                        setTimeout(() => createFloatingHeart(), i * 70);
                    }
                } else {
                    current += Math.ceil((percent - current) / 15) || 1;
                    if (current > percent) current = percent;
                    percentElement.innerText = current + "%";
                    if (meterFill) meterFill.style.width = current + "%";
                }
            }, 30);

            try {
                await addDoc(collection(db, "loveData"), {
                    yourName: name1,
                    partnerName: name2,
                    lovePercent: percent,
                    time: new Date()
                });
            } catch (e) {
                console.error("Firebase:", e);
            }
        };

        function showQuote(percent, name1, name2) {

            if (percent >= 95) {
                quote = `✨ ${name1} & ${name2} — A cosmic miracle! Your souls are intertwined across galaxies. The universe celebrates your eternal bond! ✨`;
