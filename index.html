            const name2 = document.getElementById("name2").value.trim();

            if (!name1 || !name2) {
                alert("🌌 Please enter both names to unlock the cosmic bond!");
                return;
            }

            let combined = [name1.toLowerCase(), name2.toLowerCase()].sort().join("");
            let hash = 0;
            for (let i = 0; i < combined.length; i++) {
                hash += combined.charCodeAt(i) * (i + 1) * 7;
            }
            let percent = (hash % 96) + 5;
            
            const resultDiv = document.getElementById("result");
            resultDiv.style.display = "block";
            
            resultDiv.innerHTML = `
                <div class="energy-meter">
                    <div style="font-size: 0.8rem; letter-spacing: 2px;">❤️ LOVE FREQUENCY ❤️</div>
                    <div class="percent-value" id="lovePercentAnimate">0%</div>
                    <div style="margin: 15px 0;">
                        <div style="height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden;">
                            <div id="meterFill" style="width: 0%; height: 100%; background: linear-gradient(90deg, #ff3366, #ff85a2); border-radius: 10px; transition: width 1.5s ease;"></div>
                        </div>
                    </div>
                    <div class="love-quote" id="loveQuote"></div>
                </div>
            `;

            let current = 0;
            const percentElement = document.getElementById("lovePercentAnimate");
            const meterFill = document.getElementById("meterFill");
            const timer = setInterval(() => {
                if (current >= percent) {
                    clearInterval(timer);
                    showQuote(percent, name1, name2);
                    burstConfetti();
                    playMoodSong(percent);
                    for (let i = 0; i < 40; i++) {
                        setTimeout(() => createFloatingHeart(), i * 70);
                    }
                } else {
                    current += Math.ceil((percent - current) / 15) || 1;
                    if (current > percent) current = percent;
                    percentElement.innerText = current + "%";
                    if (meterFill) meterFill.style.width = current + "%";
                }
            }, 30);

            try {
                await addDoc(collection(db, "loveData"), {
                    yourName: name1,
                    partnerName: name2,
                    lovePercent: percent,
                    time: new Date()
                });
            } catch (e) {
                console.error("Firebase:", e);
            }
        };

        function showQuote(percent, name1, name2) {
            const quoteDiv = document.getElementById("loveQuote");
            let quote = "";
            let emoji = "";
            
            if (percent >= 95) {
                quote = `✨ ${name1} & ${name2} — A cosmic miracle! Your souls are intertwined across galaxies. The universe celebrates your eternal bond! ✨`;
                emoji = "👑🌌💫💖";
            } else if (percent >= 85) {
                quote = `🌙 ${name1} & ${name2} — A match written in the stars! Your connection is destined to shine brighter than any supernova. 🌙`;
                emoji = "⭐💖🌠✨";
            } else if (percent >= 70) {
                quote = `🌸 ${name1} & ${name2} — Beautiful harmony! Your hearts dance to the same celestial rhythm. Nurture this magical bond. 🌸`;
                emoji = "💗🌈✨🌹";
            } else if (percent >= 50) {
                quote = `🌱 ${name1} & ${name2} — A promising connection! With care and understanding, your love will blossom into something extraordinary. 🌱`;
                emoji = "💕🌼🌟💫";
            } else if (percent >= 30) {
                quote = `🍃 ${name1} & ${name2} — Every great love story starts with a spark. Your journey is just beginning — let it grow organically. 🍃`;
                emoji = "💫🍀💝🌙";
            } else if (percent >= 15) {
                quote = `🌙 ${name1} & ${name2} — The stars see potential. With patience and sincerity, your connection may deepen over time. 🌙`;
                emoji = "🌠💌✨💜";
            } else {
                quote = `🌧️ ${name1} & ${name2} — A delicate connection. Love is a journey of growth; cherish the moments and nurture understanding. 🌧️`;
                emoji = "💧🍃💔🌱";
            }
            
            quoteDiv.innerHTML = `${emoji}<br>${quote}<br><span style="font-size: 0.9rem; margin-top: 10px; display: block;">❤️ Compatibility Resonance: ${percent}% ❤️</span>`;
        }

        setInterval(() => {
            if (Math.random() > 0.7) createFloatingHeart();
        }, 2000);
        
        window.addEventListener("beforeunload", () => {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
        });
        
        document.getElementById("songStatus").innerHTML = `<i class="fas fa-music"></i> ✨ Calculate to feel the cosmic melody ✨`;
    </script>
</body>
</html>
